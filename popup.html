<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube AI Chat</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div id="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 14.05 2.61 15.96 3.66 17.56L2 22L6.44 20.34C8.04 21.39 9.95 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z" fill="currentColor"/>
        </svg>
      </div>
      <div>
        <h1>YouTube AI Chat</h1>
        <p id="version">v1.0.0</p>
      </div>
    </header>

    <!-- Status card -->
    <div id="status-card">
      <div id="status-icon">
        <div id="status-dot"></div>
      </div>
      <div id="status-info">
        <div id="status-title">Checking status…</div>
        <div id="status-sub"></div>
      </div>
    </div>

    <!-- Current video section -->
    <section id="current-video-section" class="hidden">
      <div class="section-label">Current Video</div>
      <div id="current-video-card">
        <img id="current-thumb" src="" alt="" />
        <div id="current-details">
          <div id="current-title">—</div>
          <div id="current-id">—</div>
        </div>
      </div>
    </section>

    <!-- Backend config section -->
    <section>
      <div class="section-label">Backend URL</div>
      <div id="backend-display">
        <span id="backend-url-text">—</span>
        <div id="backend-status-dot"></div>
      </div>
      <p class="hint">Edit <code>constants.js</code> to change the backend URL.</p>
    </section>

    <!-- Actions -->
    <section id="actions">
      <button id="btn-open-yt" class="btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Open YouTube
      </button>
      <button id="btn-ping" class="btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.73 3.41 2 2 0 0 1 3.71 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6.29 6.29l1.07-1.07a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        Ping Backend
      </button>
    </section>

    <!-- Ping result -->
    <div id="ping-result" class="hidden">
      <div id="ping-result-text"></div>
    </div>

    <!-- Footer -->
    <footer id="footer">
      Made with ❤️ · YouTube AI Chat
    </footer>
  </div>

  <script src="constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
